<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squat Tribe</title>
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<h1>Squat Tribe</h1>

<div id="home">
  <button onclick="startSession()">Start Session</button>
  <button onclick="showHistory()">History</button>
</div>

<div id="session" style="display:none;">
  <h3 id="phase">READY</h3>

  Reps: <span id="reps">0</span><br>
  Time: <span id="time">0</span><br>
  Target: <span id="target">-</span><br><br>

  <button onclick="stopSet()">Stop</button>
  <button onclick="saveSet()">Save Set</button>
  <button onclick="startMyo()">Start Myo</button>
  <button onclick="finishSession()">Finish Session</button>
</div>

<div id="history" style="display:none;">
  <h3>History</h3>
  <div id="historyList"></div>
  <button onclick="clearHistory()">Clear History</button>
  <button onclick="goHome()">Back</button>
</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
