<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squat Tribe v2.1</title>
<link rel="stylesheet" href="styles.css"><link rel="manifest" href="manifest.json"></head>
<body>
<h1>Squat Tribe</h1>
<div id="home">
<button onclick="goProfile()">Profile</button>
<button onclick="startAnchor()">Start Anchor</button>
</div>

<div id="profile" style="display:none;">
Sensitivity:
<select id="sens">
<option value="5">Low</option>
<option value="4">Medium</option>
<option value="3.2" selected>High</option>
</select><br><br>
<button onclick="saveProfile()">Save</button>
<button onclick="goHome()">Back</button>
</div>

<div id="session" style="display:none;">
<div id="phase">READY</div>
Reps:<span id="reps">0</span><br>
Time:<span id="time">0</span><br>
Target:<span id="target">-</span><br><br>
<button onclick="stopSet()">Stop</button>
<button onclick="saveSet()">Save</button>
<button onclick="startMyo()">Start Myo</button>
<button onclick="finish()">Finish</button>
</div>

<script src="app.js"></script>
</body></html>
